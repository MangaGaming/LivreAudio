<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivrAudio - Votre Bibliothèque Audio IA</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        @theme {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            --font-serif: "Playfair Display", ui-serif, Georgia, serif;
            
            --color-brand: #6366f1;
            --color-brand-light: #818cf8;
            --color-accent: #22d3ee;
            
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }
            
            @keyframes mesh {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }

            @keyframes slide-up {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @keyframes fade-in {
                from { opacity: 0; }
                to { opacity: 1; }
            }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-mesh { 
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: mesh 15s ease infinite; 
        }
        .animate-slide-up { animation: slide-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade-in { animation: fade-in 0.5s ease forwards; }

        body { font-family: var(--font-sans); }
        .font-serif-italic { font-family: var(--font-serif); font-style: italic; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.03); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.2); }
        .shadow-glow { box-shadow: 0 0 25px rgba(99, 102, 241, 0.3); }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="animate-mesh text-slate-100 overflow-hidden selection:bg-indigo-500/30">
    <div id="root" class="flex h-screen w-full relative">
        <!-- API Setup Overlay -->
        <div id="setup-overlay" class="hidden fixed inset-0 z-[1000] bg-black/40 backdrop-blur-3xl flex items-center justify-center p-6">
            <div class="max-w-md w-full glass rounded-[48px] p-8 md:p-12 shadow-3xl space-y-10 animate-slide-up">
                <div class="space-y-6">
                    <div class="w-20 h-20 bg-linear-to-br from-indigo-600 to-cyan-500 rounded-[28px] flex items-center justify-center shadow-2xl mx-auto rotate-12">
                        <i data-lucide="key" class="text-white w-10 h-10"></i>
                    </div>
                    <div class="text-center">
                        <h2 class="text-4xl font-black tracking-tight text-white mb-3">Setup</h2>
                        <p class="text-white/40 text-sm leading-relaxed px-4">Vos clés API Gemini pour activer l'intelligence audio.</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <textarea id="keys-input" placeholder="GEMINI_API_KEY..." class="w-full h-32 bg-black/40 border border-white/5 rounded-3xl px-6 py-6 text-sm font-mono text-cyan-400 focus:ring-2 focus:ring-indigo-500 outline-none resize-none transition-all"></textarea>
                    <button id="save-keys-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-6 rounded-3xl font-black text-[11px] uppercase tracking-[0.2em] shadow-2xl transition-all active:scale-95">
                        Démarrer l'expérience
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-[320px] bg-black/20 backdrop-blur-3xl border-r border-white/5 flex flex-col z-[250] transition-transform duration-500 ease-out">
            <div class="p-10 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-linear-to-br from-indigo-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-indigo-600/30 shadow-2xl">
                        <i data-lucide="headphones" class="text-white w-6 h-6"></i>
                    </div>
                    <h1 class="font-black text-2xl tracking-tighter text-white">LivrAudio</h1>
                </div>
            </div>

            <div class="px-8 pb-8">
                <div id="dropzone" class="glass border-dashed group p-6 rounded-[32px] cursor-pointer hover:border-indigo-500/50 transition-all flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center group-hover:scale-110 group-hover:bg-indigo-600 transition-all">
                        <i data-lucide="plus" class="text-indigo-400 group-hover:text-white transition-colors"></i>
                    </div>
                    <input type="file" id="file-input" accept=".pdf" class="hidden">
                    <span class="text-[10px] uppercase font-black tracking-widest text-white/30 group-hover:text-white transition-colors">Nouveau Livre</span>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-6 py-4 space-y-8 custom-scrollbar">
                <div id="library-list" class="space-y-3">
                    <!-- Library items will be injected here -->
                </div>
            </div>

            <div class="p-8 mt-auto border-t border-white/5 space-y-4">
                <button id="settings-btn" class="w-full flex items-center justify-center gap-3 p-5 rounded-3xl border border-white/5 bg-white/[0.02] hover:bg-white/5 transition-all text-[10px] uppercase font-black tracking-widest text-white/30 hover:text-white">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    API Settings
                </button>
            </div>
        </aside>

        <!-- Sidebar Toggle -->
        <button id="toggle-sidebar" class="fixed top-1/2 -translate-y-1/2 z-[200] w-2 h-24 bg-white/10 rounded-full flex items-center justify-center hover:bg-indigo-600 transition-all text-white/40 hover:text-white left-[310px] opacity-0 hover:opacity-100">
             <i data-lucide="chevron-left" id="toggle-icon"></i>
        </button>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 relative overflow-y-auto h-screen scroll-smooth ml-[320px] transition-all">
            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center min-h-screen text-center p-8 max-w-2xl mx-auto animate-fade-in">
                <div class="w-40 h-40 bg-indigo-600/10 rounded-[64px] flex items-center justify-center mb-16 animate-float relative group">
                    <div class="absolute inset-0 bg-indigo-500/20 blur-[80px] rounded-full group-hover:blur-[100px] transition-all"></div>
                    <i data-lucide="book-open" class="text-indigo-400 relative z-10 w-20 h-20"></i>
                </div>
                <h2 class="text-7xl font-black tracking-tighter mb-8 leading-[0.9] text-white">
                    Bibliothèque <br><span class="text-transparent bg-clip-text bg-linear-to-r from-indigo-400 to-cyan-400 font-serif-italic">cinématique</span>.
                </h2>
                <p class="text-slate-400 text-lg font-medium mb-12 max-w-md mx-auto opacity-60">
                    Transformez vos écrits en paysages sonores immersifs.
                </p>
                <div id="cta-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-14 py-7 rounded-full font-black text-xs uppercase tracking-[0.3em] shadow-2xl shadow-indigo-600/40 transition-all active:scale-95 flex items-center gap-5 cursor-pointer">
                    Importer un PDF
                </div>
            </div>

            <!-- Processing State -->
            <div id="loading-state" class="hidden flex flex-col items-center justify-center min-h-screen gap-12 animate-fade-in">
                <i data-lucide="loader-2" class="animate-spin text-indigo-500 w-24 h-24 stroke-[1px]"></i>
                <div class="text-center space-y-3">
                    <h3 class="text-2xl font-black tracking-tighter uppercase opacity-80">Synchronisation</h3>
                    <p class="text-indigo-400/40 text-[9px] uppercase tracking-[0.5em] font-black italic">Analyse des structures narratives</p>
                </div>
            </div>

            <!-- Player View -->
            <div id="player-view" class="hidden w-full max-w-3xl mx-auto p-12 pt-24 mb-48 flex flex-col gap-20">
                <div class="space-y-16 animate-slide-up">
                    <div class="space-y-10 text-center">
                        <div class="relative group max-w-[340px] mx-auto animate-float">
                            <div class="absolute inset-0 bg-indigo-600/40 blur-[140px] rounded-full opacity-40 group-hover:opacity-60 transition-opacity"></div>
                            <div class="relative aspect-[3/4] glass rounded-[72px] shadow-3xl flex items-center justify-center overflow-hidden">
                                <div class="flex flex-col items-center gap-10 px-10">
                                    <div id="player-artwork" class="w-40 h-40 bg-white/5 rounded-[48px] flex items-center justify-center shadow-2xl relative">
                                        <i data-lucide="headphones" class="text-indigo-400 w-16 h-16" id="artwork-icon"></i>
                                    </div>
                                    <p id="current-part-num" class="text-7xl font-serif-italic text-indigo-500/10 leading-none">#1</p>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <h1 id="book-title" class="text-7xl font-black tracking-tighter leading-none text-white truncate max-w-lg mx-auto">Titre</h1>
                            <div class="flex items-center justify-center gap-6 opacity-30">
                                <span class="h-px w-10 bg-indigo-500"></span>
                                <span class="text-indigo-400 font-black uppercase text-[10px] tracking-[0.6em]">Immersive</span>
                                <span class="h-px w-10 bg-indigo-500"></span>
                            </div>
                        </div>
                    </div>
                    <div class="glass rounded-[56px] p-16 relative overflow-hidden shadow-indigo-900/20 shadow-3xl">
                        <div class="absolute top-0 left-0 w-2 h-full bg-indigo-600 opacity-20"></div>
                        <p id="chunk-text" class="text-3xl leading-relaxed text-white/90 font-medium italic relative z-10 selection:bg-indigo-500/40">Segment...</p>
                    </div>
                </div>

                <div class="space-y-20 animate-slide-up" style="animation-delay: 0.2s">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="glass rounded-[48px] p-8 space-y-6">
                            <select id="voice-select" class="w-full bg-transparent border-none px-6 py-4 text-sm font-black text-center appearance-none cursor-pointer text-indigo-300 focus:outline-none">
                                <!-- Voices will be injected here -->
                            </select>
                        </div>
                        
                        <div class="glass rounded-[48px] p-8 h-[300px] flex flex-col">
                            <div id="chunks-list" class="flex-1 space-y-4 overflow-y-auto custom-scrollbar pr-4">
                                <!-- Chunks will be injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Player Bar -->
        <div id="player-bar" class="hidden fixed bottom-0 left-[320px] right-0 p-10 z-[100] transition-all">
            <div class="max-w-5xl mx-auto glass p-8 rounded-full shadow-3xl shadow-black/80 group">
                <div class="absolute -top-1 left-10 right-10 h-1 bg-white/[0.02] rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-linear-to-r from-indigo-500 to-cyan-400 shadow-glow w-0 transition-all duration-300"></div>
                </div>
                <div class="flex items-center justify-between px-4">
                    <div class="flex items-center gap-8 flex-1 min-w-0">
                        <div class="w-16 h-16 bg-white/[0.03] rounded-3xl flex items-center justify-center shrink-0 border border-white/5">
                            <i data-lucide="music" class="text-indigo-400 w-7 h-7"></i>
                        </div>
                        <div class="truncate">
                            <h4 id="bar-title" class="font-black truncate text-xl text-white mb-1">Titre</h4>
                            <p id="bar-subtitle" class="text-[10px] text-indigo-400/40 uppercase tracking-[0.5em] font-black">Partie 1</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-12">
                        <button id="prev-btn" class="p-4 rounded-full text-white/20 hover:text-white hover:bg-white/5 transition-all">
                            <i data-lucide="skip-back" class="w-8 h-8"></i>
                        </button>
                        <button id="play-btn" class="w-28 h-28 bg-indigo-600 hover:bg-indigo-500 hover:scale-105 rounded-full flex items-center justify-center transition-all shadow-3xl shadow-indigo-600/40 group/play">
                            <i data-lucide="play" id="play-icon" class="w-12 h-12 text-white fill-current group-hover/play:scale-110 transition-transform"></i>
                        </button>
                        <button id="next-btn" class="p-4 rounded-full text-white/20 hover:text-white hover:bg-white/5 transition-all">
                            <i data-lucide="skip-forward" class="w-8 h-8"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
